services:
  minaclaw:
    build: .
    container_name: minaclaw-daemon
    restart: unless-stopped
    ports:
      - "127.0.0.1:6192:6192" # Internal API for host CLI
    volumes:
      - ./config:/app/config
      - ./skills:/app/skills
      # Dynamic safe mounts go here
      # Example: - /home/user/safe_docs:/mnt/safe/docs
    env_file:
      - ./config/.env
    environment:
      - NODE_ENV=production
