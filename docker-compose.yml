services:
  minaclaw:
    build: .
    container_name: minaclaw-daemon
    restart: unless-stopped
    ports:
      - 127.0.0.1:6192:6192
    volumes:
      - ./config:/app/config
      - ./skills:/app/skills
      - /home/mina-morgan/home_dashboard/home-dashboard:/mnt/safe/home-dashboard
    env_file:
      - ./config/.env
    environment:
      - NODE_ENV=production
    extra_hosts:
      - host.docker.internal:host-gateway
