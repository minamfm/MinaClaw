include:
  - path: ./config/agent-compose.yml

services:
  minaclaw:
    build: .
    container_name: minaclaw-daemon
    restart: unless-stopped
    ports:
      - 127.0.0.1:6192:6192
      - 0.0.0.0:3004:3004
    volumes:
      - ./config:/app/config
      - ./skills:/app/skills
      - /home/mina-morgan/home_dashboard/home-dashboard:/mnt/safe/home-dashboard
    env_file:
      - ./config/.env
    environment:
      - NODE_ENV=production
    extra_hosts:
      - host.docker.internal:host-gateway
    command: sh -c "[ -f /app/config/agent-setup.sh ] && sh /app/config/agent-setup.sh; printf '\\n=== daemon started ' >> /app/config/daemon.log && date >> /app/config/daemon.log && node index.js 2>&1 | tee -a /app/config/daemon.log"
