name: Feature request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Is your feature request related to a frustration or missing capability?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you've tried or other approaches you've considered.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - LLM provider
        - Telegram bot
        - WhatsApp bot
        - Web portal
        - CLI
        - Skills / memory system
        - Scheduling
        - Docker / deployment
        - Security
        - Other
